name: Deploy Hugo Site

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Install image tools
        run: sudo apt-get update && sudo apt-get install -y libheif-examples imagemagick

      - name: Normalize photos to browser-friendly JPEG
        run: |
          shopt -s nullglob
          for f in static/images/*; do
            base="$(basename "$f")"
            [[ "$base" == .* ]] && continue
            mime="$(file -b --mime-type "$f")"
            stem="${base%.*}"
            [[ "$base" != *.* ]] && stem="$base"
            out="static/images/${stem}.jpg"
            case "$mime" in
              image/heic|image/heif)
                heif-convert -q 90 "$f" "$out"
                [[ "$f" != "$out" ]] && rm -- "$f"
                echo "converted HEIC: $base -> ${stem}.jpg"
                ;;
              image/jpeg)
                [[ "$f" != "$out" ]] && mv -- "$f" "$out"
                echo "kept JPEG: $base -> ${stem}.jpg"
                ;;
              image/png|image/webp|image/gif)
                magick "$f" "$out"
                [[ "$f" != "$out" ]] && rm -- "$f"
                echo "converted ${mime}: $base -> ${stem}.jpg"
                ;;
              *)
                echo "skipping $base (unsupported MIME: $mime)"
                ;;
            esac
          done

      - name: Build
        run: hugo --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
