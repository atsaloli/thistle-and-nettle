name: Deploy Hugo Site

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Install Python image tools
        run: pip install --quiet pillow pillow-heif

      - name: Normalize photos to browser-friendly JPEG
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          from PIL import Image
          import pillow_heif

          pillow_heif.register_heif_opener()

          src_dir = "static/images"
          for name in sorted(os.listdir(src_dir)):
              if name.startswith("."):
                  continue
              path = os.path.join(src_dir, name)
              if not os.path.isfile(path):
                  continue
              if os.path.getsize(path) == 0:
                  print(f"skipping {name}: 0 bytes")
                  continue
              stem = name.rsplit(".", 1)[0] if "." in name else name
              out_path = os.path.join(src_dir, f"{stem}.webp")
              try:
                  with Image.open(path) as img:
                      img.convert("RGB").save(out_path, "WEBP", quality=85, method=6)
                  if path != out_path and os.path.exists(path):
                      os.remove(path)
                  print(f"converted: {name} -> {stem}.webp")
              except Exception as e:
                  print(f"FAILED: {name}: {e}")
          PY

      - name: Build
        run: hugo --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
