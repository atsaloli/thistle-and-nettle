<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Site.Title }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f;
      color: #e8e0d0;
      font-family: Georgia, serif;
      min-height: 100vh;
    }
    header {
      padding: 40px 32px 24px;
      border-bottom: 1px solid #2a2a2a;
    }
    header h1 {
      font-size: 28px;
      font-weight: normal;
      letter-spacing: 0.02em;
    }
    header p {
      margin-top: 6px;
      font-size: 13px;
      color: #666;
      font-family: monospace;
      letter-spacing: 0.05em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
      padding: 2px;
    }
    .grid figure {
      position: relative;
      overflow: hidden;
      background: #1a1a1a;
      aspect-ratio: 4/3;
    }
    .grid figure img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .grid figure:hover img {
      transform: scale(1.03);
    }
    .grid figure figcaption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.6);
      color: #aaa;
      font-family: monospace;
      font-size: 10px;
      padding: 6px 10px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .grid figure:hover figcaption {
      opacity: 1;
    }
    .empty {
      padding: 80px 32px;
      text-align: center;
      color: #444;
      font-family: monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <h1>{{ .Site.Title }}</h1>
    <p>photo log</p>
  </header>

  {{/* Collect all images from static/images/ */}}
  {{ $images := resources.Match "images/*" }}
  {{ if $images }}
  <div class="grid">
    {{ range $images }}
    <figure>
      <img src="{{ .RelPermalink }}" loading="lazy" alt="{{ .Name }}">
      <figcaption>{{ .Name }}</figcaption>
    </figure>
    {{ end }}
  </div>
  {{ else }}
  <div class="empty">no photos yet</div>
  {{ end }}

</body>
</html>
