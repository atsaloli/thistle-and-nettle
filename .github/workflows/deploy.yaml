name: Deploy Hugo Site

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Append .jpeg to extensionless photos
        run: |
          shopt -s nullglob
          for f in static/images/*; do
            base="$(basename "$f")"
            [[ "$base" == .* ]] && continue
            [[ "$base" == *.* ]] && continue
            mv -- "$f" "$f.jpeg"
            echo "renamed $f -> $f.jpeg"
          done

      - name: Build
        run: hugo --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
