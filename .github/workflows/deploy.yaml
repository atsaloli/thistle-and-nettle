name: Deploy Hugo Site

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Install image tools
        run: sudo apt-get update && sudo apt-get install -y libvips-tools

      - name: Normalize photos to browser-friendly JPEG
        shell: bash
        run: |
          set +e
          shopt -s nullglob
          for f in static/images/*; do
            base="$(basename "$f")"
            [[ "$base" == .* ]] && continue
            mime="$(file -b --mime-type "$f")"
            stem="${base%.*}"
            [[ "$base" != *.* ]] && stem="$base"
            out="static/images/${stem}.jpg"
            tmp="static/images/.tmp.${stem}.jpg"
            if vips copy "$f" "${tmp}[Q=90]"; then
              mv -f -- "$tmp" "$out"
              [[ "$f" != "$out" && -f "$f" ]] && rm -f -- "$f"
              echo "converted ($mime): $base -> ${stem}.jpg"
            else
              rm -f -- "$tmp"
              echo "FAILED ($mime): $base — leaving original in place"
            fi
          done
          exit 0

      - name: Build
        run: hugo --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
